default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV['DB_USERNAME'] %>
  password: <%= ENV['DB_PASSWORD'] %>
  host: localhost

development:
  <<: *default
  database: eramus_be_development

test:
  <<: *default
  database: eramus_be_test

production:
  <<: *default
  database: eramus_be_production
  username: eramus_be
  password: <%= ENV["ERAMUS_BE_DATABASE_PASSWORD"] %>